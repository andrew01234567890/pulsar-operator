apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "pulsar-operator.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - backup.pulsaroperator.io
  resources:
  - backups
  - backupschedules
  - restores
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - backup.pulsaroperator.io
  resources:
  - backups/finalizers
  - backupschedules/finalizers
  - restores/finalizers
  verbs:
  - update
- apiGroups:
  - backup.pulsaroperator.io
  resources:
  - backups/status
  - backupschedules/status
  - restores/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cluster.pulsaroperator.io
  resources:
  - autorecoveries
  - bookkeepers
  - brokers
  - functionsworkers
  - proxies
  - pulsarclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cluster.pulsaroperator.io
  resources:
  - autorecoveries/finalizers
  - bookkeepers/finalizers
  - brokers/finalizers
  - functionsworkers/finalizers
  - proxies/finalizers
  - pulsarclusters/finalizers
  verbs:
  - update
- apiGroups:
  - cluster.pulsaroperator.io
  resources:
  - autorecoveries/status
  - bookkeepers/status
  - brokers/status
  - functionsworkers/status
  - proxies/status
  - pulsarclusters/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - metadata.pulsaroperator.io
  resources:
  - oxiaclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - metadata.pulsaroperator.io
  resources:
  - oxiaclusters/finalizers
  verbs:
  - update
- apiGroups:
  - metadata.pulsaroperator.io
  resources:
  - oxiaclusters/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  verbs:
  - get
  - list
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
