{{- if .Values.rbac.helpers.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "pulsar-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "pulsar-operator.resourceName" (dict "suffix" "cluster-functionsworker-admin-role" "context" $) }}
rules:
- apiGroups:
  - cluster.pulsaroperator.io
  resources:
  - functionsworkers
  verbs:
  - '*'
- apiGroups:
  - cluster.pulsaroperator.io
  resources:
  - functionsworkers/status
  verbs:
  - get
{{- end }}
