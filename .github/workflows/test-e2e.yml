name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  test-e2e:
    permissions:
      contents: read
    # Matrix job names stay descriptive ("test-e2e (k8s 1.34)"); the
    # test-e2e-required job below re-publishes a single, stable "test-e2e"
    # check so branch protection's required check doesn't need to track
    # every Kubernetes minor in the matrix.
    name: test-e2e (k8s ${{ matrix.k8s_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # kindest/node digests are those published for kind v0.30.0 (see
          # https://github.com/kubernetes-sigs/kind/releases/tag/v0.30.0);
          # keep these in lockstep with the kind version installed below.
          - k8s_version: "1.34"
            kind_node_image: "kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a"
          - k8s_version: "1.33"
            kind_node_image: "kindest/node:v1.33.4@sha256:25a6018e48dfcaee478f4a59af81157a437f15e6e140bf103f85a2e7cd0cbbf2"
          - k8s_version: "1.32"
            kind_node_image: "kindest/node:v1.32.8@sha256:abd489f042d2b644e2d033f5c2d900bc707798d075e8186cb65e3f1367a9d5a1"
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install kind v0.30.0
        run: |
          curl -Lo ./kind https://github.com/kubernetes-sigs/kind/releases/download/v0.30.0/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e KIND_NODE_IMAGE=${{ matrix.kind_node_image }}

  test-e2e-required:
    # Gate job with a fixed name ("test-e2e") for branch protection to
    # require, independent of how many Kubernetes minors the matrix above
    # covers.
    name: test-e2e
    needs: test-e2e
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check test-e2e matrix result
        run: |
          result="${{ needs.test-e2e.result }}"
          echo "test-e2e matrix result: $result"
          if [ "$result" != "success" ]; then
            echo "One or more test-e2e matrix jobs did not succeed" >&2
            exit 1
          fi
