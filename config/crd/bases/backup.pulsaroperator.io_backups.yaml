                format: int64
                type: integer
              phase:
                description: phase is the observed lifecycle phase of the Backup.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                type: string
              sizeBytes:
                description: sizeBytes is the size of the written backup artifact,
                  in bytes.
                format: int64
                type: integer
              startTime:
                description: startTime is when the backup capture began.
                format: date-time
                type: string
            type: object
