      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Backup is the Schema for the backups API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Backup
            properties:
              clusterRef:
                description: clusterRef names the PulsarCluster, in the same namespace,
                  to back up.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              components:
                description: components selects which cluster state this Backup captures.
                properties:
                  bookkeeperVolumes:
                    default: false
                    description: |-
                      bookkeeperVolumes additionally snapshots BookKeeper's persistent
                      volumes. Not yet implemented; reserved for a future release.
                    type: boolean
                  oxiaMetadata:
                    default: true
                    description: oxiaMetadata captures the Oxia metadata store's keyspace.
                    type: boolean
                  oxiaVolumes:
                    default: false
                    description: |-
                      oxiaVolumes additionally snapshots Oxia's persistent volumes.
                      Not yet implemented; reserved for a future release.
                    type: boolean
