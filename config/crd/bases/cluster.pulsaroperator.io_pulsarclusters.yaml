---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: pulsarclusters.cluster.pulsaroperator.io
spec:
  group: cluster.pulsaroperator.io
  names:
    kind: PulsarCluster
    listKind: PulsarClusterList
    plural: pulsarclusters
    singular: pulsarcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pulsarVersion
      name: Version
      type: string
    - jsonPath: .status.brokerPhase
      name: Broker
      type: string
    - jsonPath: .status.bookKeeperPhase
      name: BookKeeper
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PulsarCluster is the Schema for the pulsarclusters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PulsarCluster
            properties:
              autoRecovery:
                description: autoRecovery configures the autorecovery component.
                properties:
                  config:
                    additionalProperties:
                      type: string
                    description: config sets bookkeeper.conf key/value overrides layered
                      on top of operator defaults.
                    type: object
                  image:
                    description: |-
                      image overrides the autorecovery container image. Falls back to
                      PulsarCluster.spec.image when unset.
                    type: string
                  mode:
                    default: embedded
                    description: |-
                      mode selects whether autorecovery runs embedded in bookie pods or as its
                      own dedicated deployment. The operator always deploys it as a standalone
                      StatefulSet; "embedded" additionally colocates the auditor process
                      configuration with bookies for smaller clusters.
                    enum:
                    - embedded
                    - dedicated
                    type: string
                  replicas:
                    default: 1
                    description: replicas is the number of autorecovery pods.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              bookKeeper:
                description: bookKeeper configures the bookie component.
                properties:
                  autoRackConfig:
                    description: autoRackConfig configures the bookie rack-awareness
                      sync daemon.
                    properties:
                      enabled:
                        default: false
                        description: enabled turns on the rack-awareness sync daemon.
                        type: boolean
                      periodSeconds:
                        default: 60
                        description: periodSeconds is the interval between rack-metadata
                          sync passes.
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                  autoscaler:
                    description: autoscaler configures the disk-watermark-driven autoscaler.
                    properties:
                      decommissionTimeoutSeconds:
                        default: 1800
                        description: |-
                          decommissionTimeoutSeconds bounds how long the guarded scale-down state
                          machine waits, once a bookie is marked read-only, for re-replication to
                          finish (zero ledgers on the target bookie and zero cluster-wide
                          under-replicated ledgers) before auto-reverting the bookie to writable,
                          clearing the decommission state, and raising a Warning condition.
                        format: int32
                        minimum: 60
                        type: integer
                      diskUsageToleranceHwm:
                        default: 92
                        description: |-
                          diskUsageToleranceHwm is the high watermark; a writable bookie at or above
                          this disk usage triggers a pre-emptive scale-up. Expressed as a
                          whole-number percent in the range 0-100 (e.g. 92 means 92% disk used);
                          autoscaler controllers divide by 100.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                      diskUsageToleranceLwm:
                        default: 75
                        description: |-
                          diskUsageToleranceLwm is the low watermark; every writable bookie must be
                          below this, with zero under-replicated ledgers cluster-wide, before a
                          scale-down is considered. Expressed as a whole-number percent in the range
                          0-100 (e.g. 75 means 75% disk used); autoscaler controllers divide by 100.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                      enabled:
                        default: false
                        description: enabled turns on the bookie disk-watermark autoscaler
                          (scale-up).
                        type: boolean
                      minWritableBookies:
                        description: |-
                          minWritableBookies is the minimum number of writable bookies to maintain.
                          Must be >= the largest configured ensembleSize.
                        format: int32
                        minimum: 1
                        type: integer
                      periodSeconds:
                        default: 10
                        description: periodSeconds is the interval between autoscaler
                          evaluations.
                        format: int32
                        minimum: 1
                        type: integer
                      scaleDownBy:
                        default: 1
                        description: scaleDownBy is the number of bookies to remove
                          on each scale-down.
                        format: int32
                        minimum: 1
                        type: integer
                      scaleDownEnabled:
                        default: false
                        description: |-
                          scaleDownEnabled gates the guarded bookie decommission state machine.
                          Kept OFF by default; enable only after validating the safe-decommission
                          workflow against your metadata store.
                        type: boolean
                      scaleUpBy:
                        default: 1
                        description: scaleUpBy is the number of bookies to add on
                          each scale-up.
                        format: int32
                        minimum: 1
                        type: integer
                      scaleUpMaxLimit:
                        description: |-
                          scaleUpMaxLimit is the maximum number of bookies. The autoscaler never
                          scales above this.
                        format: int32
                        minimum: 1
                        type: integer
                      stabilizationWindowSeconds:
                        default: 300
                        description: |-
                          stabilizationWindowSeconds gates scaling decisions until all bookie pods
                          have been continuously Ready for this long, preventing flapping.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                    x-kubernetes-validations:
                    - message: Lwm must be below Hwm
                      rule: self.diskUsageToleranceLwm < self.diskUsageToleranceHwm
                  config:
                    additionalProperties:
                      type: string
                    description: |-
                      config sets bookkeeper.conf key/value overrides layered on top of operator
                      defaults. Structural/wiring keys the operator owns —
                      journalDirectories, ledgerDirectories, indexDirectories, bookiePort,
                      httpServerEnabled, and httpServerPort — are re-asserted by the operator to
                      keep the rendered config in sync with the generated Service, probes, and
                      volume mounts, so overrides of those specific keys are ignored. Every
                      other key is applied as given.
                    type: object
                  ensemble:
                    description: ensemble configures the default ledger ensemble/write/ack
                      quorum sizes.
                    properties:
                      ackQuorum:
                        default: 2
                        description: ackQuorum is the number of acks required before
                          an entry is confirmed.
                        format: int32
                        minimum: 1
                        type: integer
                      ensembleSize:
                        default: 3
                        description: ensembleSize is the number of bookies each ledger
                          is striped across.
                        format: int32
                        minimum: 1
                        type: integer
                      writeQuorum:
                        default: 2
                        description: writeQuorum is the number of bookies each entry
                          is written to.
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                    x-kubernetes-validations:
                    - message: ackQuorum <= writeQuorum <= ensembleSize
                      rule: self.ackQuorum <= self.writeQuorum && self.writeQuorum
                        <= self.ensembleSize
                  image:
                    description: |-
                      image overrides the bookie container image. Falls back to
                      PulsarCluster.spec.image when unset.
                    type: string
                  podManagementPolicy:
                    default: Parallel
                    description: |-
                      podManagementPolicy is the StatefulSet pod management policy. Immutable
                      once set.
                    enum:
                    - OrderedReady
                    - Parallel
                    type: string
                    x-kubernetes-validations:
                    - message: podManagementPolicy is immutable
