                    format: int32
                    minimum: 0
                    type: integer
                  volumes:
                    description: volumes configures the journal/ledgers/index disk-role
                      volumes.
                    properties:
                      index:
                        description: index is the ledger-index volume.
                        properties:
                          size:
                            anyOf:
                            - type: integer
                            - type: string
                            description: size is the requested storage capacity.
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          storageClassName:
                            description: |-
                              storageClassName is the StorageClass used to provision the volume's PVC.
                              Falls back to PulsarCluster.spec.global.storageClassName when unset.
                            type: string
                        type: object
                      journal:
                        description: journal is the write-ahead-log volume.
                        properties:
                          size:
                            anyOf:
                            - type: integer
                            - type: string
                            description: size is the requested storage capacity.
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          storageClassName:
                            description: |-
                              storageClassName is the StorageClass used to provision the volume's PVC.
                              Falls back to PulsarCluster.spec.global.storageClassName when unset.
                            type: string
                        type: object
                      ledgers:
                        description: ledgers is the ledger-storage volume.
                        properties:
                          size:
                            anyOf:
                            - type: integer
                            - type: string
                            description: size is the requested storage capacity.
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          storageClassName:
                            description: |-
                              storageClassName is the StorageClass used to provision the volume's PVC.
                              Falls back to PulsarCluster.spec.global.storageClassName when unset.
                            type: string
                        type: object
                    type: object
                type: object
                x-kubernetes-validations:
                - message: ensembleSize cannot exceed replicas
                  rule: '!has(self.ensemble) || !has(self.ensemble.ensembleSize) ||
                    !has(self.replicas) || self.ensemble.ensembleSize <= self.replicas'
              broker:
                description: broker configures the broker component.
                properties:
                  antiaffinity:
                    description: antiaffinity configures pod anti-affinity rules for
                      broker pods.
                    properties:
                      enabled:
                        default: true
                        description: enabled turns on the component's default anti-affinity
                          rules.
                        type: boolean
                      host:
                        default: false
                        description: |-
                          host requires (hard) rather than prefers (soft) spreading pods across nodes.
                          Stateful tiers default this to hard; stateless tiers default it to soft.
                        type: boolean
                      zone:
                        default: false
                        description: zone requires (hard) rather than prefers (soft)
                          spreading pods across zones.
                        type: boolean
                    type: object
                  autoscaler:
                    description: autoscaler configures CPU/throughput-driven horizontal
                      scaling.
                    properties:
                      enabled:
                        default: false
                        description: enabled turns on the broker autoscaler.
                        type: boolean
                      higherCpuThreshold:
                        default: 80
                        description: |-
                          higherCpuThreshold triggers a scale-up when every broker's load is at or
                          above it. Expressed as a whole-number percent in the range 0-100 (e.g. 80
                          means 80% CPU); autoscaler controllers divide by 100.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                      lowerCpuThreshold:
                        default: 30
                        description: |-
                          lowerCpuThreshold triggers a scale-down when every broker's load is below
                          it. Expressed as a whole-number percent in the range 0-100 (e.g. 30 means
                          30% CPU); autoscaler controllers divide by 100.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                      max:
                        description: max is the maximum number of brokers. The autoscaler
                          never scales above this.
                        format: int32
                        minimum: 1
                        type: integer
                      min:
                        description: min is the minimum number of brokers. The autoscaler
                          never scales below this.
                        format: int32
                        minimum: 1
                        type: integer
                      periodSeconds:
                        default: 60
                        description: periodSeconds is the interval between autoscaler
                          evaluations.
                        format: int32
                        minimum: 1
                        type: integer
                      resourcesUsageSource:
                        default: PulsarLBReport
                        description: |-
                          resourcesUsageSource selects where broker load is read from: the Pulsar load
                          manager report, or raw Kubernetes CPU metrics.
                        enum:
                        - PulsarLBReport
                        - K8SMetrics
                        type: string
                      scaleDownBy:
                        default: 1
                        description: scaleDownBy is the number of brokers to remove
                          on each scale-down.
                        format: int32
                        minimum: 1
                        type: integer
                      scaleUpBy:
                        default: 1
                        description: scaleUpBy is the number of brokers to add on
                          each scale-up.
                        format: int32
                        minimum: 1
                        type: integer
                      stabilizationWindowSeconds:
                        default: 300
                        description: |-
                          stabilizationWindowSeconds gates scaling decisions until all broker pods have
                          been continuously Ready for this long, preventing flapping.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                    x-kubernetes-validations:
                    - message: lower threshold must be below higher
                      rule: self.lowerCpuThreshold < self.higherCpuThreshold
                    - message: min must be <= max
                      rule: '!has(self.max) || !has(self.min) || self.min <= self.max'
                  config:
                    additionalProperties:
                      type: string
                    description: config sets broker.conf key/value overrides layered
