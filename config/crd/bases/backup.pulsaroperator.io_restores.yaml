---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: restores.backup.pulsaroperator.io
spec:
  group: backup.pulsaroperator.io
  names:
    kind: Restore
    listKind: RestoreList
    plural: restores
    singular: restore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetClusterRef.name
      name: Target Cluster
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.cookieLineageCheck.result
      name: Lineage
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Restore is the Schema for the restores API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Restore
            properties:
              cookieLineagePolicy:
                default: enforce
                description: |-
                  cookieLineagePolicy controls how a BookKeeper cookie lineage mismatch
                  between the backup's capturedInstanceId and the target cluster's
                  current instanceId is handled. See CookieLineagePolicyEnforce and
                  CookieLineagePolicyOverride.
                enum:
                - enforce
                - override
                type: string
              skipEphemeral:
                default: true
                description: |-
                  skipEphemeral excludes ephemeral/transient state captured in the
                  backup (if any) from the restore.
                type: boolean
              source:
                description: source locates the backup artifact to restore from.
                properties:
                  artifactURI:
                    description: |-
                      artifactURI is the fully-qualified location of the backup artifact
                      within destination, as recorded in Backup.status.artifactURI.
                    type: string
                  destination:
                    description: destination locates the object-store artifact.
                    properties:
                      bucket:
                        description: |-
                          bucket is the object-storage bucket/container backup artifacts are
                          written into. Not used for the filesystem driver.
                        type: string
                      credentialsSecretRef:
                        description: |-
                          credentialsSecretRef references the Secret holding the destination
                          driver's object-storage credentials. The Secret's data keys must match
                          what the selected driver expects, mirroring the tiered-storage offload
                          convention:
                            - aws-s3: keys AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.
                            - azureblob: keys AZURE_STORAGE_ACCOUNT and AZURE_STORAGE_ACCESS_KEY.
                            - google-cloud-storage: a single key named "key.json" holding the
                              service-account JSON (it is mounted as a file and pointed at by
                              GOOGLE_APPLICATION_CREDENTIALS). A GCS credentials Secret that stores
                              the JSON under any other data key will fail to mount and the backup
                              Job will not start.
                            - filesystem: not used.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      driver:
                        description: driver selects the object-storage backend.
                        enum:
                        - aws-s3
                        - google-cloud-storage
                        - azureblob
                        - filesystem
                        type: string
                      endpoint:
                        description: |-
                          endpoint overrides the object-storage service endpoint, for
                          S3-compatible stores that aren't AWS.
                        type: string
                      prefix:
                        description: |-
                          prefix is a key/path prefix under the bucket (or filesystem root) that
                          namespaces this resource's backup artifacts, so multiple Backup or
                          BackupSchedule resources can share one bucket without collision.
                        type: string
                      region:
                        description: region is the object-storage region. Not used
                          for the filesystem driver.
                        type: string
                    required:
                    - driver
                    type: object
                    x-kubernetes-validations:
                    - message: bucket is required for object-store destination drivers
                        (aws-s3, google-cloud-storage, azureblob)
                      rule: self.driver == 'filesystem' || size(self.bucket) > 0
                required:
                - artifactURI
                - destination
                type: object
              targetClusterRef:
                description: |-
                  targetClusterRef names the PulsarCluster, in the same namespace, to
                  restore into.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - source
            - targetClusterRef
            type: object
          status:
            description: status defines the observed state of Restore
            properties:
              conditions:
                description: conditions represent the current state of the Restore
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              cookieLineageCheck:
                description: |-
                  cookieLineageCheck reports the outcome of the BookKeeper cookie
                  lineage check performed before replay.
                properties:
                  detail:
                    description: |-
                      detail is a human-readable explanation of the result, e.g. the
                      mismatched instanceId values.
                    type: string
                  result:
                    description: result is the outcome of the cookie lineage check.
                    enum:
                    - Passed
                    - Mismatch
                    - Unknown
                    type: string
                type: object
              keysRestored:
                description: keysRestored is the number of Oxia keys replayed into
                  the target cluster.
                format: int64
                type: integer
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase is the observed lifecycle phase of the Restore.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
