---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: functionsworkers.cluster.pulsaroperator.io
spec:
  group: cluster.pulsaroperator.io
  names:
    kind: FunctionsWorker
    listKind: FunctionsWorkerList
    plural: functionsworkers
    singular: functionsworker
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: FunctionsWorker is the Schema for the functionsworkers API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of FunctionsWorker
            properties:
              config:
                additionalProperties:
                  type: string
                description: |-
                  config sets functions_worker.yml key/value overrides layered on top of
                  operator defaults.
                type: object
              image:
                description: |-
                  image overrides the functions-worker container image. Falls back to
                  PulsarCluster.spec.image when unset.
                type: string
              mode:
                default: colocated
                description: |-
                  mode selects whether the functions worker runs colocated inside broker
                  pods or as its own standalone deployment. standalone is rejected (see
                  the CEL rule on this type) since it cannot run against an Oxia-only
                  metadata store.
                enum:
                - colocated
                - standalone
                type: string
              packageStorage:
                default: FileSystemPackagesStorage
                description: |-
                  packageStorage selects the function-package storage backend. Oxia does
                  not provide the ZooKeeper-backed distributed log package storage KAAP
                  defaults to, so "FileSystemPackagesStorage" is required (and enforced by
                  the struct-level CEL rule) while the metadata store is Oxia-only. The
                  S3PackagesStorage/GCSPackagesStorage enum values are retained only so a
                  selection of them yields a clear, targeted CEL message rather than a
                  generic enum error; they are rejected because core Pulsar ships no
                  package-storage provider for them (unlike tiered-storage OFFLOAD of
                  message data, which is a wholly separate S3/GCS path and is unaffected).
                enum:
                - FileSystemPackagesStorage
                - S3PackagesStorage
                - GCSPackagesStorage
                type: string
              packageStorageVolume:
                description: |-
                  packageStorageVolume configures the PersistentVolumeClaim the operator
                  provisions for FileSystemPackagesStorage when mode is colocated (the
                  PVC is mounted on every broker pod, since colocated functions run
                  embedded in the broker). Ignored when packageStorage is not
                  FileSystemPackagesStorage. The operator only creates this PVC if it
                  does not already exist and never edits it afterwards (most PVC fields
                  are immutable) - a ReadWriteOnce PVC is created by default, which is
                  fine for a single broker replica; for more than one broker replica the
                  volume must be a shared ReadWriteMany filesystem, so pre-provision one
                  yourself (matching this PVC's deterministic name,
                  "<cluster>-functions-package-storage") before creating the
                  PulsarCluster, or accept single-writer semantics.
                properties:
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: size is the requested storage capacity.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    description: |-
                      storageClassName is the StorageClass used to provision the volume's PVC.
                      Falls back to PulsarCluster.spec.global.storageClassName when unset.
                    type: string
                type: object
              replicas:
                description: |-
                  replicas is the number of standalone functions-worker pods. Ignored when
                  mode is "colocated".
                format: int32
                minimum: 0
                type: integer
            type: object
            x-kubernetes-validations:
            - message: 'standalone FunctionsWorker is unsupported on this Oxia-only
                operator (Pulsar''s standalone functions-worker startup unconditionally
                requires a ZooKeeper-backed metadata store for its DistributedLog
                package storage); use mode: colocated instead'
              rule: self.mode != 'standalone'
            - message: 'only FileSystemPackagesStorage is supported on this Oxia-only
                operator: S3PackagesStorage/GCSPackagesStorage have no built-in Pulsar
                package-storage provider, so the broker falls back to the ZooKeeper-backed
                BookKeeper provider and crashes on Oxia; use packageStorage: FileSystemPackagesStorage'
              rule: self.packageStorage == 'FileSystemPackagesStorage'
          status:
            description: status defines the observed state of FunctionsWorker
            properties:
              conditions:
                description: conditions represent the current state of the FunctionsWorker
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              readyReplicas:
                description: readyReplicas is the observed number of Ready functions-worker
                  pods.
                format: int32
                type: integer
              replicas:
                description: replicas is the observed number of functions-worker pods.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
