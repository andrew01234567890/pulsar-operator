  name: brokers.cluster.pulsaroperator.io
spec:
  group: cluster.pulsaroperator.io
  names:
    kind: Broker
    listKind: BrokerList
    plural: brokers
    singular: broker
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Broker is the Schema for the brokers API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Broker
            properties:
              antiaffinity:
                description: antiaffinity configures pod anti-affinity rules for broker
                  pods.
                properties:
                  enabled:
                    default: true
                    description: enabled turns on the component's default anti-affinity
                      rules.
                    type: boolean
                  host:
                    default: false
                    description: |-
                      host requires (hard) rather than prefers (soft) spreading pods across nodes.
                      Stateful tiers default this to hard; stateless tiers default it to soft.
                    type: boolean
                  zone:
                    default: false
                    description: zone requires (hard) rather than prefers (soft) spreading
                      pods across zones.
                    type: boolean
                type: object
              autoscaler:
                description: autoscaler configures CPU/throughput-driven horizontal
                  scaling.
                properties:
                  enabled:
                    default: false
                    description: enabled turns on the broker autoscaler.
                    type: boolean
                  higherCpuThreshold:
                    default: 80
                    description: |-
                      higherCpuThreshold triggers a scale-up when every broker's load is at or
                      above it. Expressed as a whole-number percent in the range 0-100 (e.g. 80
                      means 80% CPU); autoscaler controllers divide by 100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  lowerCpuThreshold:
                    default: 30
                    description: |-
                      lowerCpuThreshold triggers a scale-down when every broker's load is below
                      it. Expressed as a whole-number percent in the range 0-100 (e.g. 30 means
                      30% CPU); autoscaler controllers divide by 100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  max:
                    description: max is the maximum number of brokers. The autoscaler
                      never scales above this.
                    format: int32
                    minimum: 1
                    type: integer
                  min:
                    description: min is the minimum number of brokers. The autoscaler
                      never scales below this.
                    format: int32
                    minimum: 1
                    type: integer
                  periodSeconds:
                    default: 60
                    description: periodSeconds is the interval between autoscaler
                      evaluations.
                    format: int32
                    minimum: 1
                    type: integer
                  resourcesUsageSource:
                    default: PulsarLBReport
                    description: |-
                      resourcesUsageSource selects where broker load is read from: the Pulsar load
                      manager report, or raw Kubernetes CPU metrics.
                    enum:
                    - PulsarLBReport
                    - K8SMetrics
                    type: string
                  scaleDownBy:
                    default: 1
                    description: scaleDownBy is the number of brokers to remove on
                      each scale-down.
                    format: int32
                    minimum: 1
                    type: integer
                  scaleUpBy:
                    default: 1
                    description: scaleUpBy is the number of brokers to add on each
                      scale-up.
                    format: int32
                    minimum: 1
                    type: integer
                  stabilizationWindowSeconds:
                    default: 300
                    description: |-
                      stabilizationWindowSeconds gates scaling decisions until all broker pods have
                      been continuously Ready for this long, preventing flapping.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              config:
                additionalProperties:
                  type: string
                description: config sets broker.conf key/value overrides layered on
                  top of operator defaults.
                type: object
              image:
                description: |-
                  image overrides the broker container image. Falls back to
                  PulsarCluster.spec.image when unset.
                type: string
              loadBalancer:
                default: extensible
                description: |-
                  loadBalancer selects the Pulsar load manager implementation. "extensible"
                  (ExtensibleLoadManagerImpl) is required for live bundle-transfer scale-down
                  and is strongly recommended over the legacy "simple" load manager.
                enum:
                - extensible
                - simple
                type: string
              pdb:
                description: pdb configures the PodDisruptionBudget for broker pods.
                properties:
                  enabled:
                    default: true
                    description: enabled controls whether the operator creates a PodDisruptionBudget
                      for this component.
                    type: boolean
                  maxUnavailable:
                    anyOf:
                    - type: integer
                    - type: string
                    description: |-
                      maxUnavailable is the maximum number of pods that can be unavailable during a
                      voluntary disruption. Defaults are computed from component quorum math.
                    x-kubernetes-int-or-string: true
                type: object
              replicas:
                description: replicas is the number of broker pods.
                format: int32
                minimum: 0
                type: integer
              resources:
                description: resources are the compute resource requirements for the
                  broker container.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
            type: object
          status:
            description: status defines the observed state of Broker
            properties:
              conditions:
                description: conditions represent the current state of the Broker
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastScaleTime:
                description: |-
                  lastScaleTime is the last time the broker autoscaler changed
                  spec.replicas. The stabilization window is measured from this
                  timestamp, so it is left unset until the first autoscaler-driven
                  scaling event.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              readyReplicas:
                description: readyReplicas is the observed number of Ready broker
                  pods.
                format: int32
                type: integer
              replicas:
                description: replicas is the observed number of broker pods.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
