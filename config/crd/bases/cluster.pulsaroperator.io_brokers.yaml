      type: integer
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Broker is the Schema for the brokers API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Broker
            properties:
              antiaffinity:
                description: antiaffinity configures pod anti-affinity rules for broker
                  pods.
                properties:
                  enabled:
                    default: true
                    description: enabled turns on the component's default anti-affinity
                      rules.
                    type: boolean
                  host:
                    default: false
                    description: |-
                      host requires (hard) rather than prefers (soft) spreading pods across nodes.
                      Stateful tiers default this to hard; stateless tiers default it to soft.
                    type: boolean
                  zone:
                    default: false
                    description: zone requires (hard) rather than prefers (soft) spreading
                      pods across zones.
                    type: boolean
                type: object
              autoscaler:
                description: autoscaler configures CPU/throughput-driven horizontal
                  scaling.
                properties:
                  enabled:
                    default: false
                    description: enabled turns on the broker autoscaler.
                    type: boolean
                  higherCpuThreshold:
                    default: 80
                    description: |-
                      higherCpuThreshold triggers a scale-up when every broker's load is at or
                      above it. Expressed as a whole-number percent in the range 0-100 (e.g. 80
                      means 80% CPU); autoscaler controllers divide by 100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  lowerCpuThreshold:
                    default: 30
                    description: |-
                      lowerCpuThreshold triggers a scale-down when every broker's load is below
                      it. Expressed as a whole-number percent in the range 0-100 (e.g. 30 means
                      30% CPU); autoscaler controllers divide by 100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  max:
                    description: max is the maximum number of brokers. The autoscaler
                      never scales above this.
                    format: int32
                    minimum: 1
                    type: integer
                  min:
                    description: min is the minimum number of brokers. The autoscaler
                      never scales below this.
                    format: int32
                    minimum: 1
                    type: integer
                  periodSeconds:
                    default: 60
                    description: periodSeconds is the interval between autoscaler
                      evaluations.
                    format: int32
                    minimum: 1
                    type: integer
                  resourcesUsageSource:
                    default: PulsarLBReport
                    description: |-
                      resourcesUsageSource selects where broker load is read from: the Pulsar load
                      manager report, or raw Kubernetes CPU metrics.
                    enum:
                    - PulsarLBReport
                    - K8SMetrics
                    type: string
                  scaleDownBy:
                    default: 1
                    description: scaleDownBy is the number of brokers to remove on
                      each scale-down.
                    format: int32
                    minimum: 1
                    type: integer
                  scaleUpBy:
                    default: 1
                    description: scaleUpBy is the number of brokers to add on each
                      scale-up.
                    format: int32
                    minimum: 1
                    type: integer
                  stabilizationWindowSeconds:
                    default: 300
                    description: |-
                      stabilizationWindowSeconds gates scaling decisions until all broker pods have
                      been continuously Ready for this long, preventing flapping.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
                x-kubernetes-validations:
                - message: lower threshold must be below higher
                  rule: self.lowerCpuThreshold < self.higherCpuThreshold
                - message: min must be <= max
                  rule: '!has(self.max) || !has(self.min) || self.min <= self.max'
              config:
                additionalProperties:
                  type: string
                description: config sets broker.conf key/value overrides layered on
                  top of operator defaults.
                type: object
              env:
                description: |-
                  env are additional environment variables set on the broker container,
                  e.g. tiered-storage offload driver credentials the umbrella PulsarCluster
                  reconciler wires in from spec.offload.credentialsSecretRef.
                items:
                  description: EnvVar represents an environment variable present in
                    a Container.
                  properties:
                    name:
                      description: |-
                        Name of the environment variable.
                        May consist of any printable ASCII characters except '='.
                      type: string
                    value:
                      description: |-
                        Variable references $(VAR_NAME) are expanded
                        using the previously defined environment variables in the container and
                        any service environment variables. If a variable cannot be resolved,
                        the reference in the input string will be unchanged. Double $$ are reduced
                        to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                        "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                        Escaped references will never be expanded, regardless of whether the variable
                        exists or not.
                        Defaults to "".
                      type: string
                    valueFrom:
                      description: Source for the environment variable's value. Cannot
                        be used if value is not empty.
                      properties:
                        configMapKeyRef:
                          description: Selects a key of a ConfigMap.
                          properties:
                            key:
                              description: The key to select.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the ConfigMap or its key
                                must be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                        fieldRef:
                          description: |-
                            Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                            spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                          properties:
                            apiVersion:
                              description: Version of the schema the FieldPath is
                                written in terms of, defaults to "v1".
                              type: string
                            fieldPath:
                              description: Path of the field to select in the specified
                                API version.
                              type: string
                          required:
                          - fieldPath
                          type: object
                          x-kubernetes-map-type: atomic
                        fileKeyRef:
                          description: |-
                            FileKeyRef selects a key of the env file.
                            Requires the EnvFiles feature gate to be enabled.
                          properties:
                            key:
                              description: |-
                                The key within the env file. An invalid key will prevent the pod from starting.
                                The keys defined within a source may consist of any printable ASCII characters except '='.
                                During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                              type: string
                            optional:
                              default: false
                              description: |-
                                Specify whether the file or its key must be defined. If the file or key
                                does not exist, then the env var is not published.
                                If optional is set to true and the specified key does not exist,
                                the environment variable will not be set in the Pod's containers.

                                If optional is set to false and the specified key does not exist,
                                an error will be returned during Pod creation.
                              type: boolean
                            path:
                              description: |-
                                The path within the volume from which to select the file.
                                Must be relative and may not contain the '..' path or start with '..'.
                              type: string
                            volumeName:
                              description: The name of the volume mount containing
                                the env file.
                              type: string
                          required:
                          - key
                          - path
                          - volumeName
                          type: object
                          x-kubernetes-map-type: atomic
                        resourceFieldRef:
                          description: |-
                            Selects a resource of the container: only resources limits and requests
                            (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                          properties:
                            containerName:
                              description: 'Container name: required for volumes,
                                optional for env vars'
                              type: string
                            divisor:
                              anyOf:
                              - type: integer
                              - type: string
                              description: Specifies the output format of the exposed
                                resources, defaults to "1"
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            resource:
                              description: 'Required: resource to select'
                              type: string
                          required:
                          - resource
                          type: object
                          x-kubernetes-map-type: atomic
                        secretKeyRef:
                          description: Selects a key of a secret in the pod's namespace
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                  required:
                  - name
                  type: object
                type: array
              image:
