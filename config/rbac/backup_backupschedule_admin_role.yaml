# This rule is not used by the project pulsar-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over backup.pulsaroperator.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pulsar-operator
    app.kubernetes.io/managed-by: kustomize
  name: backup-backupschedule-admin-role
rules:
- apiGroups:
  - backup.pulsaroperator.io
  resources:
  - backupschedules
  verbs:
  - '*'
- apiGroups:
  - backup.pulsaroperator.io
  resources:
  - backupschedules/status
  verbs:
  - get
