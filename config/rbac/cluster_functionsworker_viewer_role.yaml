# This rule is not used by the project pulsar-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to cluster.pulsaroperator.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pulsar-operator
    app.kubernetes.io/managed-by: kustomize
  name: cluster-functionsworker-viewer-role
rules:
- apiGroups:
  - cluster.pulsaroperator.io
  resources:
  - functionsworkers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cluster.pulsaroperator.io
  resources:
  - functionsworkers/status
  verbs:
  - get
